<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://google.com/">
    <title>Redirecting</title>
    <script>
        // Fallback javascript redirection
        window.location.replace("https://google.com/");
    </script>
</head>
<body>
    <p>If you are not redirected automatically, <a href="https://google.com/">click here</a>.</p>
</body>
</html>
